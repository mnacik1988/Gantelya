<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GYM G — Спортклуб</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --red: #E63946;
  --red-dark: #c62b38;
  --dark: #0d0d0d;
  --dark2: #151515;
  --dark3: #1c1c1c;
  --dark4: #252525;
  --dark5: #2f2f2f;
  --gray: #888;
  --light: #f0f0f0;
  --white: #ffffff;
  --font-head: 'Oswald', sans-serif;
  --font-body: 'Nunito Sans', sans-serif;
  --card-radius: 14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--dark);color:var(--light);-webkit-font-smoothing:antialiased;overflow-x:hidden}
.app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--dark);position:relative}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;background:linear-gradient(180deg,var(--dark2) 0%,transparent 100%);position:sticky;top:0;z-index:50;backdrop-filter:blur(12px)}
.header-left{display:flex;align-items:center;gap:12px}
.header h1{font-family:var(--font-head);font-size:22px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--white)}
.header h1 span{color:var(--red)}
.admin-toggle{display:flex;align-items:center;gap:6px;background:var(--dark4);border:1px solid var(--dark5);border-radius:20px;padding:6px 12px;color:var(--gray);font-size:11px;cursor:pointer;transition:all .2s;font-family:var(--font-body)}
.admin-toggle.active{background:rgba(230,57,70,0.15);border-color:var(--red);color:var(--red)}
.admin-toggle svg{width:14px;height:14px}

/* Bottom Nav */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;display:flex;background:var(--dark2);border-top:1px solid var(--dark4);z-index:100;padding-bottom:env(safe-area-inset-bottom,0)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px 12px;background:none;border:none;color:var(--gray);font-size:10px;font-family:var(--font-body);font-weight:600;cursor:pointer;transition:color .2s;position:relative}
.nav-btn svg{width:22px;height:22px}
.nav-btn.active{color:var(--red)}
.nav-btn.active::before{content:'';position:absolute;top:0;left:25%;right:25%;height:2px;background:var(--red);border-radius:0 0 4px 4px}

/* Content */
.content{padding:8px 16px 90px}
.section-header{font-family:var(--font-head);font-size:20px;font-weight:700;color:var(--white);margin-bottom:16px;text-transform:uppercase;letter-spacing:2px}

/* Cards */
.card{background:var(--dark3);border-radius:var(--card-radius);padding:18px;margin-bottom:14px;border:1px solid var(--dark4);transition:transform .15s}
.card:hover{transform:translateY(-1px)}
.card-title{font-family:var(--font-head);font-size:15px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--red);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card-title svg{width:18px;height:18px}

/* Schedule */
.schedule-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--dark4);font-size:14px}
.schedule-row:last-child{border-bottom:none}
.schedule-day{color:var(--gray);font-weight:600}
.schedule-hours{color:var(--white);font-weight:700}

/* Location */
.location-block{display:flex;align-items:center;gap:10px;color:var(--light);font-size:14px}
.location-block svg{width:20px;height:20px;color:var(--red);flex-shrink:0}

/* Photo Grid */
.photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.photo-card{border-radius:12px;padding:28px 14px 14px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;aspect-ratio:1;position:relative;overflow:hidden}
.photo-card .emoji{font-size:40px;margin-bottom:8px}
.photo-card .label{font-family:var(--font-head);font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--white);text-align:center}

/* Trainer List */
.trainer-item{display:flex;align-items:center;gap:14px;padding:14px;background:var(--dark3);border-radius:var(--card-radius);margin-bottom:10px;border:1px solid var(--dark4);cursor:pointer;transition:all .2s}
.trainer-item:hover{border-color:var(--red);background:var(--dark4)}
.trainer-avatar{width:52px;height:52px;border-radius:50%;background:var(--dark5);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;border:2px solid var(--dark5)}
.trainer-item:hover .trainer-avatar{border-color:var(--red)}
.trainer-info{flex:1;min-width:0}
.trainer-name{font-family:var(--font-head);font-size:16px;font-weight:600;color:var(--white);margin-bottom:2px}
.trainer-spec{font-size:12px;color:var(--gray)}
.trainer-rating{display:flex;align-items:center;gap:4px;font-size:13px;font-weight:700;color:#fbbf24}
.trainer-rating svg{width:14px;height:14px;color:#fbbf24}
.trainer-actions{display:flex;gap:6px;align-items:center}
.trainer-actions svg{width:18px;height:18px;color:var(--gray)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--dark2);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;padding:24px 20px 32px;animation:slideUp .3s ease-out}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px}
.modal-close{background:var(--dark4);border:none;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gray);transition:all .2s}
.modal-close:hover{background:var(--red);color:var(--white)}
.modal-close svg{width:18px;height:18px}
.modal-avatar{width:72px;height:72px;border-radius:50%;background:var(--dark4);display:flex;align-items:center;justify-content:center;font-size:38px;border:3px solid var(--red);margin-bottom:12px}
.modal-name{font-family:var(--font-head);font-size:24px;font-weight:700;color:var(--white);margin-bottom:4px}
.modal-section{margin-top:18px;padding-top:18px;border-top:1px solid var(--dark4)}
.modal-label{font-family:var(--font-head);font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--red);margin-bottom:8px}
.modal-text{font-size:14px;color:var(--light);line-height:1.6}
.modal-price{font-family:var(--font-head);font-size:28px;font-weight:700;color:var(--white)}
.book-btn{width:100%;padding:16px;background:var(--red);color:var(--white);border:none;border-radius:12px;font-family:var(--font-head);font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:2px;cursor:pointer;margin-top:20px;transition:background .2s}
.book-btn:hover{background:var(--red-dark)}

/* Event Cards */
.event-filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.event-filter{padding:6px 14px;border-radius:20px;border:1px solid var(--dark5);background:var(--dark3);color:var(--gray);font-size:12px;font-family:var(--font-body);font-weight:600;cursor:pointer;transition:all .2s}
.event-filter.active{background:var(--red);border-color:var(--red);color:var(--white)}
.event-card{display:flex;gap:14px;padding:16px;background:var(--dark3);border-radius:var(--card-radius);margin-bottom:10px;border:1px solid var(--dark4)}
.event-emoji{width:44px;height:44px;border-radius:12px;background:var(--dark5);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.event-content{flex:1}
.event-title{font-family:var(--font-head);font-size:15px;font-weight:600;color:var(--white);margin-bottom:4px}
.event-desc{font-size:13px;color:var(--gray);line-height:1.5;margin-bottom:6px}
.event-date{font-size:11px;color:var(--red);font-weight:700}
.event-type-badge{font-size:9px;padding:2px 8px;border-radius:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;display:inline-block;margin-bottom:6px}
.badge-event{background:rgba(59,130,246,.2);color:#60a5fa}
.badge-discount{background:rgba(230,57,70,.2);color:var(--red)}
.badge-news{background:rgba(34,197,94,.2);color:#4ade80}
.badge-change{background:rgba(250,204,21,.2);color:#facc15}

/* Feed */
.feed-card{padding:16px;background:var(--dark3);border-radius:var(--card-radius);margin-bottom:10px;border:1px solid var(--dark4);border-left:3px solid var(--red)}
.feed-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.feed-emoji{font-size:20px}
.feed-title{font-family:var(--font-head);font-size:15px;font-weight:600;color:var(--white)}
.feed-text{font-size:13px;color:var(--light);line-height:1.6;margin-bottom:8px}
.feed-date{font-size:11px;color:var(--gray)}

/* Admin Form */
.admin-form{margin-top:16px}
.form-group{margin-bottom:14px}
.form-label{font-family:var(--font-head);font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--gray);margin-bottom:6px;display:block}
.form-input{width:100%;padding:10px 14px;background:var(--dark4);border:1px solid var(--dark5);border-radius:10px;color:var(--white);font-size:14px;font-family:var(--font-body);transition:border-color .2s}
.form-input:focus{outline:none;border-color:var(--red)}
.form-input::placeholder{color:#555}
.form-actions{display:flex;gap:8px;margin-top:16px}
.btn{padding:10px 20px;border-radius:10px;border:none;font-family:var(--font-head);font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:1px;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--red);color:var(--white)}
.btn-primary:hover{background:var(--red-dark)}
.btn-secondary{background:var(--dark5);color:var(--light)}
.btn-danger{background:#7f1d1d;color:#fca5a5}
.btn-danger:hover{background:#991b1b}
.add-trainer-btn{width:100%;padding:14px;background:var(--dark3);border:2px dashed var(--dark5);border-radius:var(--card-radius);color:var(--gray);font-family:var(--font-head);font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;margin-top:10px}
.add-trainer-btn:hover{border-color:var(--red);color:var(--red)}
.add-trainer-btn svg{width:18px;height:18px}
.emoji-picker{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.emoji-opt{width:40px;height:40px;border-radius:10px;background:var(--dark4);border:2px solid transparent;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.emoji-opt:hover{background:var(--dark5)}
.emoji-opt.selected{border-color:var(--red);background:rgba(230,57,70,.15)}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--red);color:var(--white);padding:14px 28px;border-radius:12px;font-family:var(--font-head);font-weight:600;font-size:14px;z-index:999;animation:toastIn .3s ease-out;box-shadow:0 8px 32px rgba(230,57,70,0.4);text-transform:uppercase;letter-spacing:1px;white-space:nowrap}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,20px)}to{opacity:1;transform:translate(-50%,0)}}

.hidden{display:none}
</style>
</head>
<body>

<div class="app" id="app">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <svg viewBox="0 0 100 100" width="38" height="38">
        <polygon points="50,5 93,27.5 93,72.5 50,95 7,72.5 7,27.5" fill="#1a1a1a" stroke="#E63946" stroke-width="6"/>
        <text x="50" y="62" text-anchor="middle" font-family="Oswald,sans-serif" font-weight="900" font-size="48" fill="white" letter-spacing="-2">G</text>
      </svg>
      <h1>GYM <span>G</span></h1>
    </div>
    <button class="admin-toggle" id="adminToggle" onclick="toggleAdmin()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      <span id="adminLabel">DEV</span>
    </button>
  </div>

  <!-- Content area -->
  <div class="content" id="content"></div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-home" onclick="switchTab('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1"/></svg>
      <span>Главная</span>

    <button class="nav-btn" id="nav-trainers" onclick="switchTab('trainers')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
      <span>Тренеры</span>
    </button>
    <button class="nav-btn" id="nav-events" onclick="switchTab('events')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>Ивенты</span>
    </button>
    <button class="nav-btn" id="nav-feed" onclick="switchTab('feed')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      <span>Лента</span>
    </button>
  </nav>
</div>

<!-- Toast -->
<div class="toast hidden" id="toast"></div>

<!-- Trainer Detail Modal -->
<div class="modal-overlay hidden" id="trainerModal" onclick="closeTrainerModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div>
        <div class="modal-avatar" id="modalAvatar"></div>
        <div class="modal-name" id="modalName"></div>
        <div style="display:flex;align-items:center;gap:6px">
          <svg viewBox="0 0 24 24" fill="#fbbf24" stroke="none" width="14" height="14"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.27 5.82 22 7 14.14l-5-4.87 6.91-1.01z"/></svg>

      </div>
      <button class="modal-close" onclick="closeTrainerModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>

    </div>
    <div class="modal-section">
      <div class="modal-label">Опыт</div>
      <div class="modal-text" id="modalExp"></div>
    </div>
    <div class="modal-section">
      <div class="modal-label">Программа тренировок</div>
      <div class="modal-text" id="modalProgram"></div>
    </div>
    <div class="modal-section">
      <div class="modal-label">Стоимость</div>
      <div class="modal-price" id="modalPrice"></div>
    </div>
    <button class="book-btn" id="bookBtn" onclick="">📅 Записаться к тренеру</button>
  </div>
</div>

<!-- Admin Edit Modal -->
<div class="modal-overlay hidden" id="editModal" onclick="closeEditModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-name" id="editTitle">Новый тренер</div>
      <button class="modal-close" onclick="closeEditModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>

    <div class="admin-form">
      <div class="form-group">

      <div class="form-group">
        <label class="form-label">Имя тренера</label>
        <input class="form-input" id="editName" placeholder="Введите имя">
      </div>
      <div class="form-group">
        <label class="form-label">Опыт</label>
        <input class="form-input" id="editExp" placeholder="Напр: 5 лет">
      </div>
      <div class="form-group">
        <label class="form-label">Специализация</label>
        <input class="form-input" id="editSpec" placeholder="Напр: Бокс и кикбоксинг">
      </div>
      <div class="form-group">
        <label class="form-label">Программа тренировок</label>
        <input class="form-input" id="editProgram" placeholder="Программы через запятую">
      </div>
      <div class="form-group">
        <label class="form-label">Цена</label>
        <input class="form-input" id="editPrice" placeholder="Напр: 500 грн/час">
      </div>
      <div class="form-group">
        <label class="form-label">Рейтинг (1–5)</label>
        <input class="form-input" id="editRating" type="number" step="0.1" min="1" max="5" value="5">

        <button class="btn btn-primary" style="flex:1" onclick="saveTrainer()">Сохранить</button>

        <button class="btn btn-secondary" onclick="closeEditModal()">Отмена</button>
      </div>
    </div>
  </div>
</div>

// ─── LocalStorage ───
function loadTrainers(){
  try{const d=localStorage.getItem(STORAGE_KEY);if(d)trainers=JSON.parse(d);}catch{}
}
function saveTrainersToStorage(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(trainers));}catch{}
}

// ─── Init ───
loadTrainers();
render();

// ─── Navigation ───
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+tab).classList.add('active');
  render();
}

// ─── Admin Toggle ───
function toggleAdmin(){
  isAdmin=!isAdmin;
  const btn=document.getElementById('adminToggle');
  const label=document.getElementById('adminLabel');
  btn.classList.toggle('active',isAdmin);
  label.textContent=isAdmin?'ADMIN':'DEV';
  render();
}

// ─── Toast ───
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.remove('hidden');
  setTimeout(()=>t.classList.add('hidden'),2500);
}

// ─── Render ───
function render(){
  const c=document.getElementById('content');
  if(currentTab==='home') c.innerHTML=renderHome();
  else if(currentTab==='trainers') c.innerHTML=renderTrainers();
  else if(currentTab==='events') c.innerHTML=renderEvents();
  else if(currentTab==='feed') c.innerHTML=renderFeed();
}

// ─── Trainers ───
function renderTrainers(){
  let html=`<div class="section-header">💪 Тренеры</div>`;
  trainers.forEach(t=>{
    html+=`
    <div class="trainer-item" onclick="${isAdmin?`openEditModal(${t.id})`:`openTrainerModal(${t.id})`}">
      <div class="trainer-avatar">${t.avatar}</div>
      <div class="trainer-info">
        <div class="trainer-name">${t.name}</div>
        <div class="trainer-spec">${t.specialty} · ${t.experience}</div>
      </div>
      <div class="trainer-rating">
        <svg viewBox="0 0 24 24" fill="#fbbf24" stroke="none" width="14" height="14"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.27 5.82 22 7 14.14l-5-4.87 6.91-1.01z"/></svg>
        ${t.rating}

  });
  if(isAdmin){
    html+=`

// ─── Events ───
function renderEvents(){
  const filters=[{id:'all',label:'Все'},{id:'event',label:'Ивенты'},{id:'discount',label:'Скидки'},{id:'news',label:'Новости'},{id:'change',label:'Изменения'}];
  const badgeClass={event:'badge-event',discount:'badge-discount',news:'badge-news',change:'badge-change'};
  const badgeLabel={event:'Ивент',discount:'Скидка',news:'Новость',change:'Изменение'};
  const filtered=eventFilter==='all'?events:events.filter(e=>e.type===eventFilter);

  let html=`<div class="section-header">📅 Ивенты и новости</div><div class="event-filter-bar">`;
  filters.forEach(f=>{
    html+=`<button class="event-filter ${eventFilter===f.id?'active':''}" onclick="setEventFilter('${f.id}')">${f.label}</button>`;
  });
  html+=`</div>`;
  filtered.forEach(e=>{
    html+=`
    <div class="event-card">
      <div class="event-emoji">${e.emoji}</div>
      <div class="event-content">
        <span class="event-type-badge ${badgeClass[e.type]}">${badgeLabel[e.type]}</span>
        <div class="event-title">${e.title}</div>
        <div class="event-desc">${e.desc}</div>
        <div class="event-date">${e.date}</div>
      </div>
    </div>`;
  });
  return html;
}

function setEventFilter(f){eventFilter=f;render();}

      <div class="feed-text">${f.text}</div>
      <div class="feed-date">${f.date}</div>
    </div>`;
  });

}

// ─── Trainer View Modal ───
function openTrainerModal(id){
  const t=trainers.find(x=>x.id===id);if(!t)return;
  document.getElementById('modalAvatar').textContent=t.avatar;
  document.getElementById('modalName').textContent=t.name;
  document.getElementById('modalRating').textContent=t.rating;
  document.getElementById('modalSpecialty').textContent=t.specialty;
  document.getElementById('modalExp').textContent=t.experience;
  document.getElementById('modalProgram').textContent=t.program;
  document.getElementById('modalPrice').textContent=t.price;
  document.getElementById('bookBtn').setAttribute('onclick',`bookTrainer('${t.name}')`);
  document.getElementById('trainerModal').classList.remove('hidden');
}
function closeTrainerModal(){document.getElementById('trainerModal').classList.add('hidden');}
function bookTrainer(name){showToast('Запись к '+name+' отправлена!');closeTrainerModal();}

// ─── Admin Edit Modal ───
const avatarOptions=['🏋️','🤸','🥊','💪','🧘','🏃','⚡','🎯'];

function openEditModal(id){
  const t=id?trainers.find(x=>x.id===id):null;
  editingId=id;
  document.getElementById('editTitle').textContent=t?'Редактировать':'Новый тренер';
  document.getElementById('editName').value=t?t.name:'';
  document.getElementById('editExp').value=t?t.experience:'';
  document.getElementById('editSpec').value=t?t.specialty:'';
  document.getElementById('editProgram').value=t?t.program:'';
  document.getElementById('editPrice').value=t?t.price:'';
  document.getElementById('editRating').value=t?t.rating:5;
  selectedAvatar=t?t.avatar:'🏋️';
  document.getElementById('deleteBtn').classList.toggle('hidden',!t);

  // Emoji picker
  let ep='';
  avatarOptions.forEach(e=>{
    ep+=`<button class="emoji-opt ${selectedAvatar===e?'selected':''}" onclick="pickAvatar('${e}')">${e}</button>`;
  });
  document.getElementById('emojiPicker').innerHTML=ep;

  document.getElementById('editModal').classList.remove('hidden');
}
function closeEditModal(){document.getElementById('editModal').classList.add('hidden');editingId=null;}
function pickAvatar(e){
  selectedAvatar=e;
  document.querySelectorAll('.emoji-opt').forEach(b=>{
    b.classList.toggle('selected',b.textContent.trim()===e);
  });
}
function saveTrainer(){
  const data={
    id:editingId||Date.now(),
    name:document.getElementById('editName').value||'Без имени',
    avatar:selectedAvatar,
    experience:document.getElementById('editExp').value||'—',
    specialty:document.getElementById('editSpec').value||'—',
    program:document.getElementById('editProgram').value||'—',
    price:document.getElementById('editPrice').value||'—',
    rating:parseFloat(document.getElementById('editRating').value)||5
  };
  if(editingId){
    trainers=trainers.map(t=>t.id===editingId?data:t);
    showToast('Тренер обновлён');
  }else{
    trainers.push(data);
    showToast('Тренер добавлен');
  }
  saveTrainersToStorage();
  closeEditModal();
  render();
}
function deleteTrainer(){
  if(!editingId)return;
  trainers=trainers.filter(t=>t.id!==editingId);
  saveTrainersToStorage();
  showToast('Тренер удалён');
  closeEditModal();
  render();
}
</script>
